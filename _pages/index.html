{% include header.html %}
<main class="Page-content">
  <div class="container">
    <article class="Page-main Article">
      <div class="Article-content">
        <div id="userArea"></div>
        <div id="loginArea">
          <!-- <div id="login_popup" class="login_popup"><span>用新浪微博一步登录</span><a href="https://api.weibo.com/oauth2/authorize?client_id=1792878965&response_type=code&redirect_uri={{ 'https://persona.ourai.ws/auth/weibo' | url_encode }}" class="icon"></a>
            <div>其他登录方式陆续开发中，造成不便，敬请谅解</div>
          </div> -->
          <form id="loginForm" class="form-horizontal">
            <div class="form-group">
              <label for="inputEmail" class="col-sm-2 control-label">电子邮箱</label>
              <div class="col-sm-10">
                <input type="email" class="form-control" id="inputEmail" placeholder="请输入电子邮箱">
              </div>
            </div>
            <div class="form-group">
              <label for="inputCode" class="col-sm-2 control-label">验证码</label>
              <div class="col-sm-10">
                <input type="text" class="form-control" id="inputCode" disabled placeholder="请输入收到的验证码">
              </div>
            </div>
            <div class="form-group">
              <div class="col-sm-offset-2 col-sm-10">
                <button id="getCode" type="button" class="btn btn-default">获取验证码</button>
                <button type="submit" class="btn btn-primary">提交</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </article>
  </div>
</main>
